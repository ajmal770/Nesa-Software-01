<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Create User / Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #c4cfe2;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
      }

      .card {
        border-radius: 15px;
      }

      .card-header {
        background: linear-gradient(135deg, #0a2fd6, #084298);
        padding: 20px;
      }

      .card-header h4 {
        font-weight: 600;
        letter-spacing: 1px;
      }

      .form-control,
      .form-select {
        border-radius: 8px;
        padding: 10px 12px;
        transition: all 0.3s ease;
      }

      .form-control:focus,
      .form-select:focus {
        border-color: #fd0d0dad;
        box-shadow: 0 0 8px rgba(156, 49, 7, 0.733);
      }

      .btn-primary {
        border-radius: 8px;
        padding: 10px;
        font-weight: 500;
        transition: 0.3s ease;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      .btn-outline-secondary {
        border-radius: 8px;
      }

      .errorlist {
        list-style: none;
        padding: 0;
        margin-top: 5px;
        color: #dc3545;
        font-size: 14px;
      }

      .required::after {
        content: " *";
        color: red;
      }
    </style>
  </head>
  <body>
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
          <div class="card shadow-lg border-0">
            <div class="card-header text-white text-center">
              <h4>Create User / Admin</h4>
            </div>

            <div class="card-body p-4">
              <form method="post" novalidate>
                {% csrf_token %}

                <!-- Username -->
                <div class="mb-3">
                  <label class="form-label fw-semibold required">
                    {{ form.username.label }}
                  </label>
                  {{ form.username }} {{ form.username.errors }}
                </div>

                <!-- Email -->
                <div class="mb-3">
                  <label class="form-label fw-semibold required">
                    {{ form.email.label }}
                  </label>
                  {{ form.email }} {{ form.email.errors }}
                </div>

                <!-- Password -->
                <div class="mb-3">
                  <label class="form-label fw-semibold required">
                    {{ form.password.label }}
                  </label>
                  {{ form.password }} {{ form.password.errors }}
                </div>

                <!-- Role -->
                <div class="mb-4">
                  <label class="form-label fw-semibold required">
                    {{ form.role.label }}
                  </label>
                  {{ form.role }} {{ form.role.errors }}
                </div>

                <!-- Submit Button -->
                <div class="d-grid mb-3">
                  <button type="submit" class="btn btn-primary">
                    Create User
                  </button>
                </div>

                <!-- Back Button -->
                <div class="text-center">
                  <a
                    href="{% url 'superadmin_dashboard' %}"
                    class="btn btn-outline-secondary btn-sm"
                  >
                    Back to Dashboard
                  </a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>

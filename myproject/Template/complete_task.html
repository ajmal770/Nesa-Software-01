{% extends 'base.html' %}

{% block content %}
<div class="table-container">
    <h2>Completed Tasks</h2>
    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>Description</th>
                <th>Status</th>
                <th>Due Date</th>
            </tr>
        </thead>
        <tbody>
            {% for task in tasks %}
            <tr>
                <td>{{ task.title }}</td>
                <td>{{ task.description }}</td>
                <td>{{ task.status }}</td>
                <td>{{ task.due_date }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" style="text-align:center;">No completed tasks found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<style>
body {
    font-family: 'Inter', sans-serif;
    background: #f5f5f5;
    padding: 40px;
}

.table-container {
    max-width: 800px;
    margin: 0 auto;
    background: #fff;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.2);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
    font-size: 26px;
    color: #222;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid #ddd;
}

th {
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    color: #fff;
}

tr:hover {
    background: #f1f1f1;
}

@media (max-width: 600px) {
    .table-container {
        padding: 20px;
    }

    h2 {
        font-size: 22px;
    }
}
</style>
{% endblock %}
